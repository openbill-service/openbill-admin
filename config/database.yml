development:
  adapter: postgresql
  encoding: unicode
  pool: 5
  <% if ENV.key?('DATABASE_HOST') %>
  host: <%= ENV.fetch('DATABASE_HOST', 'localhost') %>
  <% end %>
  database: <%= ENV.fetch('DATABASE_NAME', 'kiiiosk_production' ) %>
  pool: <%= ENV.fetch('DATABASE_POOL', 5) %>
  username: <%= ENV['DATABASE_USER'] %>
  password: <%= ENV['DATABASE_PASS'] %>

test:
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch('DATABASE_HOST', 'localhost') %>
  database: <%= ENV.fetch('DATABASE_NAME_TEST', 'kormilica_test') %>
  pool: <%= ENV.fetch('DATABASE_POOL', 5) %>
  username: <%= ENV.fetch('DATABASE_USER', '') %>
  password: <%= ENV.fetch('DATABASE_PASS', '') %>

staging:
  adapter: postgresql
  encoding: unicode
  database: kormilica_test
  pool: 5
  username:
  password:

production:
  adapter: postgresql
  encoding: unicode
  reconnect: true
    <% if ENV.key?('DATABASE_HOST') %>
  host: <%= ENV.fetch('DATABASE_HOST', 'localhost') %>
  <% end %>
  database: <%= ENV.fetch('DATABASE_NAME', 'merchantly_production' ) %>
  pool: <%= ENV.fetch('DATABASE_POOL', 5) %>
  username: <%= ENV['DATABASE_USER'] %>
  password: <%= ENV['DATABASE_PASS'] %>
