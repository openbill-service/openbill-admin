version: "8.0"

environment:
  RAILS_ENV: development
  BUNDLE_DEPLOYMENT: "false"
  BUNDLE_WITHOUT: ""

compose:
  files:
    - docker-compose.dev.yml

interaction:
  shell:
    description: Open a Bash shell in app container
    service: app
    command: bash
    compose:
      run_options: [no-deps]

  bundle:
    description: Run Bundler commands
    service: app
    command: bundle

  yarn:
    description: Run Yarn commands
    service: app
    command: yarn

  rails:
    description: Run Rails commands
    service: app
    command: bundle exec rails
    environment:
      DATABASE_HOST: postgres
      DATABASE_USER: postgres
      DATABASE_PASS: postgres
      DATABASE_NAME: openbill_development
      DATABASE_NAME_TEST: openbill_test
      DATABASE_POOL: 5

  rake:
    description: Run Rake commands
    service: app
    command: bundle exec rake
    environment:
      DATABASE_HOST: postgres
      DATABASE_USER: postgres
      DATABASE_PASS: postgres
      DATABASE_NAME: openbill_development
      DATABASE_NAME_TEST: openbill_test
      DATABASE_POOL: 5

  rspec:
    description: Run RSpec tests
    service: app
    command: bundle exec rspec
    environment:
      RAILS_ENV: test
      DATABASE_HOST: postgres
      DATABASE_USER: postgres
      DATABASE_PASS: postgres
      DATABASE_NAME: openbill_development
      DATABASE_NAME_TEST: openbill_test
      DATABASE_POOL: 5
    compose:
      run_options:
        - -e RAILS_ENV=test

  test:
    description: Run full test cycle (db prepare + contract + zeitwerk + rspec)
    service: app
    command: >-
      bash -lc "bundle exec rails db:prepare &&
      bundle exec rake openbill_core:verify_contract &&
      bundle exec rails zeitwerk:check &&
      bundle exec rspec"
    environment:
      RAILS_ENV: test
      DATABASE_HOST: postgres
      DATABASE_USER: postgres
      DATABASE_PASS: postgres
      DATABASE_NAME: openbill_development
      DATABASE_NAME_TEST: openbill_test
      DATABASE_POOL: 5
    compose:
      run_options:
        - -e RAILS_ENV=test

  server:
    description: Start the application in Docker
    service: app
    compose:
      method: up

provision:
  - dip build app
  - dip compose up -d postgres
  - bash -lc 'until dip compose exec postgres pg_isready -U postgres >/dev/null 2>&1; do sleep 1; done; dip compose exec postgres pg_isready -U postgres'
  - dip bundle install
  - dip yarn install --frozen-lockfile || dip yarn install
  - dip rails db:prepare
  - dip rails db:prepare RAILS_ENV=test
